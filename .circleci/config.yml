version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: pip install -r requirements.txt

      - run:
          name: Lint
          command: flake8 .

      - run:
          name: Tests
          command: pytest

workflows:
  version: 2
  test:
    jobs:
      - test

// In CircleCI, we define a job that uses a Python 3.11 Docker image to run our tests. 
// The job includes steps to check out the code, install dependencies, lint the code, and run tests. 
// We also define a workflow to execute this job, which is necessary in CircleCI to orchestrate the execution of jobs.
